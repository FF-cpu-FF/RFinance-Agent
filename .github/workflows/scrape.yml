name: Reddit Finanz-Agent

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  models: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scraper ausführen
        run: python scraper.py
        env:
          REDDIT_FEED_URL: ${{ secrets.REDDIT_FEED_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Änderungen committen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/history.json
          git diff --cached --quiet || git commit -m "chore: update data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git pull --rebase origin main
          git push
